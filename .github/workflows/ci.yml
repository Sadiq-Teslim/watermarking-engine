name: FPWM CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Unit + integration tests
        env:
          REDIS_URL: redis://localhost:6379/0
        run: pytest -q

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run robustness benchmark (Tier 1)
        run: python -m bench.run_benchmark
      - name: Enforce accuracy gates
        run: python -m bench.gates
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fpwm-benchmark-report
          path: bench/report.json
