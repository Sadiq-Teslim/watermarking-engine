name: FPWM CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Unit + integration tests
        env:
          REDIS_URL: redis://localhost:6379/0
        run: pytest -q

  # Image accuracy — the primary product gate (classical engine, both modes).
  image-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Image benchmark (qim-dct, unhinted)
        run: python -m bench.run_image_benchmark && python -m bench.image_gates
      - name: Image benchmark (qim-dct-hinted — product mode)
        env:
          FPWM_BENCH_ENGINE: qim-dct-hinted
        run: python -m bench.run_image_benchmark && python -m bench.image_gates
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: image-benchmark-report
          path: bench/image_report.json

  # Neural tier (TrustMark) — survives crop/rotate/unknown sizes. CPU torch.
  image-benchmark-neural:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps (incl. neural image tier)
        run: pip install -r requirements.txt -r requirements-neural-image.txt
      - name: Image benchmark (trustmark)
        env:
          FPWM_BENCH_ENGINE: trustmark
        run: python -m bench.run_image_benchmark && python -m bench.image_gates
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: image-benchmark-neural-report
          path: bench/image_report.json

  # Video accuracy — tracked separately; hardening pass follows the image work.
  video-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Video benchmark (Tier 1)
        run: python -m bench.run_benchmark
      - name: Enforce video accuracy gates
        run: python -m bench.gates
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video-benchmark-report
          path: bench/report.json
